<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#69b9e8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='55' r='40' fill='%23d63a2e'/><circle cx='38' cy='45' r='9' fill='white'/><circle cx='58' cy='45' r='9' fill='white'/><circle cx='40' cy='46' r='4'/><circle cx='60' cy='46' r='4'/><path d='M46 55 L74 60 L46 70 Z' fill='%23f59d00'/></svg>"
    />
    <title>怒鸟出击</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #274357;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
      }
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #274357;
        color: #fff;
        font-family: 'Microsoft YaHei', Arial, sans-serif;
        text-align: center;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      #rotate-hint .phone {
        font-size: 64px;
        animation: rot 1.6s ease-in-out infinite;
      }
      @keyframes rot {
        0%,
        20% {
          transform: rotate(0deg);
        }
        60%,
        100% {
          transform: rotate(90deg);
        }
      }
      @media (orientation: portrait) {
        #rotate-hint {
          display: flex;
        }
      }
      #ver-badge {
        position: fixed;
        left: 6px;
        bottom: 4px;
        z-index: 5;
        font: 12px/1.4 Arial, sans-serif;
        color: rgba(255, 255, 255, 0.55);
        pointer-events: none;
      }
      #boot-warn {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 99;
        padding: 10px 14px;
        background: #c0392b;
        color: #fff;
        font: 14px/1.5 'Microsoft YaHei', Arial, sans-serif;
        word-break: break-all;
        pointer-events: none;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-j2wwvnY0.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate-hint">
      <div class="phone">📱</div>
      <div style="font-size: 20px">请横屏游玩</div>
    </div>
    <div id="ver-badge">v1.2</div>
    <div id="boot-warn"></div>
    <script>
      // 启动诊断：脚本加载失败/运行报错/超时未启动时给出可见提示（游戏正常启动后自动隐藏）
      (function () {
        var warn = document.getElementById('boot-warn');
        var shown = 0;
        function show(msg) {
          if (shown >= 2) return;
          shown++;
          warn.style.display = 'block';
          warn.textContent += (shown > 1 ? '  |  ' : '') + msg;
        }
        window.addEventListener(
          'error',
          function (e) {
            if (e.target && (e.target.src || e.target.href)) {
              show('资源加载失败: ' + (e.target.src || e.target.href) + ' —— 请清除缓存后强制刷新 (电脑 Ctrl+F5)');
            } else if (e.message) {
              show('运行错误: ' + e.message);
            }
          },
          true
        );
        window.addEventListener('unhandledrejection', function (e) {
          show('异常: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
        });
        setTimeout(function () {
          if (!window.__gameBooted && !shown) {
            show('游戏未能启动（可能是旧缓存）。请清除浏览器缓存后重试：电脑按 Ctrl+F5，手机在浏览器设置里清除缓存。');
          }
        }, 10000);
        window.__hideBootWarn = function () {
          warn.style.display = 'none';
        };
      })();
    </script>
  </body>
</html>
